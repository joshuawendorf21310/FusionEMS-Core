name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

env:
  AWS_REGION: "us-east-1"
  EXPECTED_AWS_ACCOUNT_ID: "793439286972"

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::793439286972:role/FusionEMS-GHA-TerraformProd
          aws-region: ${{ env.AWS_REGION }}

      - name: Enforce AWS account
        run: |
          set -euo pipefail
          acct="$(aws sts get-caller-identity --query Account --output text)"
          if [[ -n "${EXPECTED_AWS_ACCOUNT_ID}" && "$acct" != "${EXPECTED_AWS_ACCOUNT_ID}" ]]; then
            echo "ERROR: Wrong AWS account."
            exit 1
          fi

      - name: Terraform Init
        run: terraform init -lock-timeout=10m
        working-directory: infra/terraform/environments/${{ matrix.environment }}

      - name: Terraform Plan (Drift Check)
        id: plan
        run: |
          set -euo pipefail
          terraform plan -detailed-exitcode -lock-timeout=10m -no-color 2>&1 | tee drift_output.txt || true
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        working-directory: infra/terraform/environments/${{ matrix.environment }}

      - name: Alert on Drift
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('infra/terraform/environments/${{ matrix.environment }}/drift_output.txt', 'utf8');
            const truncated = output.length > 60000 ? output.substring(0, 60000) + '\n... (truncated)' : output;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Terraform Drift Detected: ${{ matrix.environment }}',
              body: '## Infrastructure Drift Detected\n\nEnvironment: `${{ matrix.environment }}`\nDate: `' + new Date().toISOString() + '`\n\n<details><summary>Drift Details</summary>\n\n```\n' + truncated + '\n```\n</details>\n\n**Action Required:** Review and reconcile infrastructure state.',
              labels: ['infrastructure', 'drift']
            });
