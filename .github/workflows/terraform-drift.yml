name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly at 3 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

env:
  TF_VERSION: "1.6.0"
  AWS_REGION: "us-east-1"

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform/environments/${{ matrix.environment }}
      - name: Terraform Plan (Drift Check)
        id: plan
        run: |
          terraform plan -detailed-exitcode -no-color 2>&1 | tee drift_output.txt || true
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        working-directory: infra/terraform/environments/${{ matrix.environment }}
      - name: Alert on Drift
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('infra/terraform/environments/${{ matrix.environment }}/drift_output.txt', 'utf8');
            const truncated = output.length > 60000 ? output.substring(0, 60000) + '\n... (truncated)' : output;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Terraform Drift Detected: ${{ matrix.environment }}`,
              body: '## Infrastructure Drift Detected\n\nEnvironment: `${{ matrix.environment }}`\nDate: `' + new Date().toISOString() + '`\n\n<details><summary>Drift Details</summary>\n\n```\n' + truncated + '\n```\n</details>\n\n**Action Required:** Review and reconcile infrastructure state.',
              labels: ['infrastructure', 'drift']
            });
