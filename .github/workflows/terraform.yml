name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'

concurrency:
  group: terraform-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.6.0"
  AWS_REGION: "us-east-1"
  TF_WORKING_DIR: "infra/terraform/environments/prod"
  AWS_ROLE_TO_ASSUME: "arn:aws:iam::793439286972:role/GitHubTerraformRole"

jobs:
  # Job 1: lint-and-validate
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff
        working-directory: infra/terraform
      - name: Terraform Init (validation only)
        run: terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

  # Job 2: security-scan (PR only)
  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
          soft_fail: false
      - name: checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          framework: terraform
          quiet: true
          soft_fail: false
          config_file: checkov.yml

  # Job 3: policy-check (PR only)
  policy-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Install Conftest
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          curl -sL "https://github.com/open-policy-agent/conftest/releases/download/v${LATEST_VERSION}/conftest_${LATEST_VERSION}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/
      - name: Run OPA Policy Checks
        run: conftest test infra/terraform/modules/ -p opa/policies/ --all-namespaces

  # Job 4: plan (PR only)
  plan:
    runs-on: ubuntu-latest
    needs: [lint-and-validate, security-scan, policy-check]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS Identity
        run: |
          echo "Verifying AWS identity..."
          aws sts get-caller-identity
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          terraform show -no-color -json tfplan > plan.json
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Check for Destructive Changes
        id: destructive
        run: |
          DESTROYS=$(cat ${{ env.TF_WORKING_DIR }}/plan.json | jq '[.resource_changes[]? | select(.change.actions | contains(["delete"]))] | length')
          RDS_REPLACE=$(cat ${{ env.TF_WORKING_DIR }}/plan.json | jq '[.resource_changes[]? | select(.type == "aws_db_instance" and (.change.actions | contains(["delete"])))] | length')
          VPC_REPLACE=$(cat ${{ env.TF_WORKING_DIR }}/plan.json | jq '[.resource_changes[]? | select(.type == "aws_vpc" and (.change.actions | contains(["delete"])))] | length')
          echo "destroys=$DESTROYS" >> $GITHUB_OUTPUT
          echo "rds_replace=$RDS_REPLACE" >> $GITHUB_OUTPUT
          echo "vpc_replace=$VPC_REPLACE" >> $GITHUB_OUTPUT
          if [ "$RDS_REPLACE" -gt 0 ] || [ "$VPC_REPLACE" -gt 0 ]; then
            echo "::error::DESTRUCTIVE CHANGES DETECTED: RDS replacements=$RDS_REPLACE, VPC replacements=$VPC_REPLACE"
            echo "blocked=true" >> $GITHUB_OUTPUT
          else
            echo "blocked=false" >> $GITHUB_OUTPUT
          fi
      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const destroys = '${{ steps.destructive.outputs.destroys }}';
            const blocked = '${{ steps.destructive.outputs.blocked }}';
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            let body = '### Terraform Plan\n\n';
            if (blocked === 'true') {
              body += '🚨 **DESTRUCTIVE CHANGES DETECTED** - Manual approval required\n\n';
            }
            body += `Resources to destroy: ${destroys}\n\n`;
            body += '<details><summary>Show Plan</summary>\n\n```\n' + truncated + '\n```\n</details>';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      - name: Fail on Destructive Changes
        if: steps.destructive.outputs.blocked == 'true'
        run: |
          if ! gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -q 'approve-destroy'; then
            echo "::error::Destructive changes require 'approve-destroy' label on PR"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # Job 5: cost-estimate (PR only)
  cost-estimate:
    runs-on: ubuntu-latest
    needs: [lint-and-validate]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      - name: Generate Infracost Diff
        run: |
          infracost diff --path=${{ env.TF_WORKING_DIR }} \
            --format=json --out-file=/tmp/infracost.json || true
      - name: Post Infracost Comment
        if: always()
        uses: infracost/actions/comment@v3
        with:
          path: /tmp/infracost.json
          behavior: update
        continue-on-error: true

  # Job 6: container-scan (PR only, if Dockerfile changed)
  container-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -t fusionems-backend:scan ./backend
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'fusionems-backend:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # Job 7: apply (merge to main only)
  apply:
    runs-on: ubuntu-latest
    needs: [lint-and-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS Identity
        run: |
          echo "Verifying AWS identity..."
          aws sts get-caller-identity
      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ${{ env.TF_WORKING_DIR }}
