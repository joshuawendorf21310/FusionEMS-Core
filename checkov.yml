compact: true
directory:
  - infra/terraform
framework:
  - terraform
quiet: true
skip-check:
  - CKV_AWS_144  # S3 cross-region replication (handled at module level)
  - CKV_AWS_145  # S3 KMS encryption (we use it but checkov may false-positive)
  - CKV2_AWS_6   # S3 public access (handled in module)
  - CKV2_AWS_28  # ALB WAF protection (networking ALB protected at infrastructure layer; ecs-cluster ALB has WAF association)
  - CKV2_AWS_57  # Secrets Manager auto-rotation (requires Lambda rotation function; tracked for future implementation)
  - CKV_AWS_158  # CloudWatch Log Group KMS (audit log group uses KMS; other ephemeral log groups use default encryption)
soft-fail: false
